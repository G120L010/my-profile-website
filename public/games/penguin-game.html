<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素企鵝互動小遊戲</title>
  <style>
    /* 全域樣式重置，統一盒模型計算方式並清除僞元素預設間距 */
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    /* 全域背景為淡藍色雪地，並隱藏滾動條以納入畫面環境 */
    body {
      background-color: rgb(231, 251, 253);
      font-family: sans-serif;
      overflow: hidden;
    }

    /* 遊戲主畫布最外層定位容器，撐滿全視窗且點擊游標樣式 */
    .wrapper {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
    }

    /* 企鵝主體定位容器，絕對定位且 0.5s 緩動過渡 */
    .penguin_wrapper {
      position: absolute;
      width: 96px;
      height: 96px;
      overflow: hidden;
      transition: 0.5s;
    }

    /* SVG 元素預設為區塊類型顯示 */
    svg {
      display: block;
    }

    /* 企鵝容器內的 SVG 填充色設定為深藍色 */
    .penguin_wrapper svg {
      fill: navy;
    }

    /* 企鵝內層容器，充滿寬高且不帶過渡 */
    .penguin_inner_wrapper {
      height: 100%;
      width: 100%;
      transition: 0;
    }

    /* 面對左上、左方、左下方向時，將企鵝小圖水平鏡像實現左向 */
    .facing_upleft,
    .facing_left,
    .facing_downleft {
      transform: scale(-1, 1);
    }

    /* 企鵝雪碧圖第一播放容器，絕對定位且不攔截滑鼠事件 */
    .penguin_sprite {
      position: absolute;
      height: calc(6 * 96px);
      width: calc(8 * 96px);
      pointer-events: none;
    }

    /* 雪碧圖內的圖片元素充滿容器寬高 */
    .penguin_sprite img {
      height: 100%;
      width: 100%;
      display: block;
    }

    /* 碰撞區域外層包裝，居中對齊且不攔截滑鼠事件 */
    .hit_wrapper {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    /* 企鵝身體核心碰撞區域寬高設定 */
    .hit_area {
      height: 50px;
      width: 40px;
      display: flex;
      flex-wrap: wrap;
      /* border: red 1px solid; */
    }

    /* 足印元素樣式，絕對定位於最底層，像素渲染並伴隨 10 秒淡出動畫 */
    .foot_print {
      height: 30px;
      width: 30px;
      position: absolute;
      z-index: -10;
      image-rendering: pixelated;
      background-size: 30px;
      background: url(../images/games/penguingame01.jpg);
      animation: forwards fade 10s;
    }

    /* 足印淡出動畫幀，前 50% 保持 0.4 不透明，後 50% 逐漸消失 */
    @keyframes fade {
      0% {
        opacity: 0.4
      }

      50% {
        opacity: 0.4
      }

      100% {
        opacity: 0
      }
    }

    /* 跳躍印輕微淡出動畫幀，較足印更淡 */
    @keyframes fade_lighter {
      0% {
        opacity: 0.1
      }

      50% {
        opacity: 0.1
      }

      100% {
        opacity: 0
      }
    }

    /* 跳躍冰坑印記元素樣式，絕對定位於最底層，像素渲染並伴隨 10 秒淡出 */
    .jump_print {
      height: 32px;
      width: 36px;
      position: absolute;
      z-index: -10;
      image-rendering: pixelated;
      background-size: 36px 32px;
      background: url(../images/games/penguingame02.jpg);
      animation: forwards fade_lighter 10s;
    }

    /* 星星導引點容器，絕對定位且置於高層級 20 */
    .star {
      position: absolute;
      width: 16px;
      height: 16px;
      overflow: hidden;
      z-index: 20;
    }

    /* 星星雪碧圖容器，絕對定位且不攔截滑鼠事件 */
    .star_sprite {
      position: absolute;
      height: 100%;
      width: calc(4 * 16px);
      pointer-events: none;
    }

    /* 星星容器內的 SVG 彩色設定為淡藍色 */
    .star svg {
      fill: rgb(148, 234, 255)
    }

    /* 星星閃爍動畫展開狀態，無限循環 1 秒閃爍 */
    .star.twinkle {
      animation: infinite twinkle 1s;
    }

    /* 星星閃爍動畫幀，在 50% 時放大到 1.5 倍實現閃爍感 */
    @keyframes twinkle {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.5);
      }

      100% {
        transform: scale(1);
      }
    }

    /* 個人署名文字區塊樣式，固定於畫面右下角 */
    .sign {
      position: absolute;
      color: rgb(0, 17, 255);
      bottom: 10px;
      right: 10px;
      font-size: 20px;
    }
  </style>
</head>

        celebrate: [5, 6, 7, 6, 3, 4], // 慶祝動畫影格
        turnFromup: [0, 1, 2, 3, 4], // 轉向動作影格

      const setMargin = (target, x, y) => {

      // 將角度映射方向轉為方向映射角度的鍵值對反向轉換函式
      const reverseDirectionConversions = () => {

      }

      // 控制企鵝雪碧圖影格播放與走路/慶祝動畫切換的動畫核心函式

      const randomDirection = () => {
        const availableDirections = turnDirections.filter(t => t !== 'turn')
        return availableDirections[Math.floor(Math.random() * availableDirections.length)]

      // 企鵝實例物理狀態資料範本

      // 弧度轉換成角度
      const radToDeg = rad => Math.round(rad * (180 / Math.PI))

      // 捨入到最近的分貝倍數值
      const nearestN = (n, denom) => {
        return n === 0 ? 0 : (n - 1) + Math.abs(((n - 1) % denom) - denom)

      // 判斷兩個座標值是否在小範圍重疊緩衝區內的輔助函式

        return Math.abs(a - b) < buffer

      // 計算滑鼠點擊點與企鵝當前位置之間的傾斜角度並以 45 度為單位捨入的計算函式

        const angle = radToDeg(Math.atan2(penguinData.pos.y - control.y, penguinData.pos.x - control.x)) - 90
        const adjustedAngle = angle < 0 ? angle + 360 : angle
        return nearestN(adjustedAngle, 45)

      // 控制 SVG 圖形元素影格位置切換（如星星閃爍）的定時器動畫函式
      const animateSvg = ({ target, start, end, interval, speed }) => {
        const startFrame = start || 0
        let i = startFrame
        clearInterval(interval)
        interval = setInterval(() => {
          target.style.marginLeft = `${-(i * 100)}%` // 移動雪碧圖影格
          i = i >= end ?
            startFrame :
            i + 1
        }, speed || 100)
      }

      // 切換企鵝當前播放動作動畫名稱並重設影格索引的狀態函式
      const changeAnimation = animation => {
        penguinData.frame = 0 // 動畫播放起始重置
        penguinData.animation = animation
      }

      // 停止企鵝步進移动並進入特定靜止或慶祝動作動畫的停止控制函式
      const stopPenguin = animation => {
        changeAnimation(animation)
        penguinData.stop = true // 標記停止
      }

      // 檢查企鵝是否超出瀏覽器邊框，並限制且更新企鵝實體座標與層級的定位函式
      const checkBoundaryAndUpdatePenguinPos = (x, y, penguin, penguinData) => {
        const lowerLimit = -40 // 安全邊緣
        const upperLimit = 40

        if (x > lowerLimit && x < (body.clientWidth - upperLimit)) {
          penguinData.marginPos.x = x
        }
        if (y > lowerLimit && y < (body.clientHeight - upperLimit)) {
          penguinData.marginPos.y = y
        }
        setMargin(penguin, penguinData.marginPos.x, penguinData.marginPos.y) // 套用平移位移
      }

      // 企鵝在雪地走路時在身後動態留下左右腳印與角度微調的特效函式
      const createMark = (penguin, angle) => {
        const { height, left, top } = penguin.getBoundingClientRect()
        const mark = document.createElement('div')
        penguinData.stepLeft = !penguinData.stepLeft
        mark.className = 'foot_print'
        mark.style.transform = `rotate(${angle}deg) scale(${penguinData.stepLeft ? -1 : 1}, 1)` // 左右交替腳印鏡像
        penguinData.pos.x = left + 5
        penguinData.pos.y = top + (height - 20)
        setPos(mark, penguinData.pos.x, penguinData.pos.y) // 套用腳印物理坐標
        body.append(mark)
        setTimeout(() => body.removeChild(mark), 10000) // 10秒後雪印自然融化移除
      }

      // 企鵝原地跳躍慶祝時在身後留下雙腳跳躍冰坑特效的視覺函式
      const createJumpMark = penguin => {
        const { left, top } = penguin.childNodes[1].childNodes[3].childNodes[1].getBoundingClientRect()
        const mark = document.createElement('div')
        mark.className = 'jump_print'

        setPos(mark, left + 1, top + 33) // 套用坐標
        body.append(mark)
        setTimeout(() => body.removeChild(mark), 10000) // 10秒後融化
      }

      // 偵測企鵝是否已觸摸到點擊產生的星星目標點的碰撞偵測函式
      const touchedTheStar = (x, y) => {
        return (x === penguinData.marginPos.x && y === penguinData.marginPos.y) ||
          (overlap(control.x, penguinData.pos.x) && overlap(control.y, penguinData.pos.y))
      }

      // 企鵝點擊尋路的核心路徑計算與步進移動控制函式
      const moveAbout = penguin => {
        const penguinDir = +reverseDirectionConversions()[penguinData.direction]
        const angle = clickedAngle() // 計算夾角

        const turnValue = penguinDir === angle ?
          0 :
          penguinDir < angle ?
            1 :
            -1

        penguinData.turnIndex += turnValue
        if (penguinData.turnIndex < 0) penguinData.turnIndex = 7
        if (penguinData.turnIndex > 7) penguinData.turnIndex = 0
        penguinData.direction = turnDirections[penguinData.turnIndex] // 更新企鵝朝向
        const { direction: dir } = penguinData
        penguin.childNodes[1].className = `penguin_inner_wrapper facing_${dir}`

        createMark(penguin.childNodes[1].childNodes[3].childNodes[1], penguinDir) // 動態渲染小腳印

        let { x, y } = penguinData.marginPos

        // 計算步進像素位移
        if (dir !== 'up' && dir !== 'down') x += (dir.includes('left')) ? -distance : distance
        if (dir !== 'left' && dir !== 'right') y += (dir.includes('up')) ? -distance : distance

        if (touchedTheStar(x, y)) {
          // 星星碰觸到了，移動到最終點，轉爲慶祝祝賀動畫
          checkBoundaryAndUpdatePenguinPos(control.x, control.y, penguin, penguinData)
          stopPenguin('turnFrom' + sprites[dir])
          penguinData.direction = 'turn'
          setTimeout(() => {
            if (penguinData.direction === 'turn') {
              stopPenguin('celebrate') // 正式進入慶祝
            }
          }, 100 * animationFrames['turnFrom' + sprites[dir]].length)
          if (star) {
            star.classList.remove('twinkle')
            animateSvg({
              target: star.childNodes[1],
              end: 3,
              interval: starInterval,
            })
            setTimeout(() => {
              if (touchedTheStar(x, y) && star) {
                clearInterval(starInterval)
                body.removeChild(star) // 移除星星
                star = null
              }
            }, 400)
          }
        }

        checkBoundaryAndUpdatePenguinPos(x, y, penguin, penguinData)
        if (!penguinData.stop) penguinData.moveTimer = setTimeout(() => {
          moveAbout(penguin) // 遞迴步進位移
        }, penguinData.moveSpeed)
      }

      const svgWrapper = ({ content, w, h, frameWidth, spriteNo }) => `<svg x="0px" y="0px" width="${frameWidth}%" height="${100 / spriteNo}%" viewBox="0 0 ${w} ${h}">${content}</svg>`

      // 解析拼裝 SVG 壓縮路徑以繪製多方向企鵝雪碧圖資源的輔助函式
      const mapPenguinAssets = () => Object.keys(directions).map(dir => {
        return dir === 'turn' ?
          svgWrapper({
            content: decode(penguinSvg[dir]),
            w: 384,
            h: 48,
            frameWidth: 100,
            spriteNo
          }) :
          svgWrapper({
            content: decode(penguinSvg[dir]),
            w: 240,
            h: 48,
            frameWidth: (100 / 8) * 5,
            spriteNo
          })
      }).join('')

      // 實例化企鵝主體 DOM 並初始化其座標與預設動畫的建構建立函式
      const createPenguin = (x, y) => {
        const penguin = document.createElement('div')
        penguin.className = 'penguin_wrapper'
        penguin.innerHTML = `
        <div class="penguin_inner_wrapper">
          <div class="penguin_sprite">
            ${mapPenguinAssets()}
          </div>
          <div class="hit_wrapper">
            <div class="hit_area">
            </div>
          </div>
        </div>
        `
        setMargin(penguin, x, y)
        body.append(penguin)
        const { width, height, left, top } = penguin.getBoundingClientRect()

        Object.assign(penguinData, {
          penguin: penguin,
          marginPos: { x, y },
          pos: {
            x: left + (width / 2),
            y: top + (height / 2),
          }
        })
        animatePenguin(penguin) // 啟動影格重繪
        stopPenguin('stop')     // 初始為靜止
      }

      createPenguin((body.clientWidth / 2) - 48, (body.clientHeight / 2) - 48)

      // 在點擊點實例化引導企鵝前往的閃爍星星元素與動畫初始化的控制函式
      const createStar = () => {
        if (star) {
          body.removeChild(star)
          star = null
        }
        star = document.createElement('div')
        star.className = ('star twinkle')
        star.innerHTML = `
        <div class="star_sprite">
          ${svgWrapper({
          content: decode(starSvg),
          w: 64, h: 16,
          frameWidth: 100, spriteNo: 1
        })}
        </div>`
        setPos(star, control.x - 8, control.y - 8)
        body.append(star)
      }

      // 監聽畫布的滑鼠點擊事件，發起尋路走路行為
      body.addEventListener('click', e => {
        control.x = e.pageX
        control.y = e.pageY
        createStar() // 點擊生成小星星

        if (penguinData.stop) {
          changeAnimation('walk') // 切換成走路
          penguinData.stop = false
          moveAbout(penguinData.penguin, penguinData) // 開發引導走路尋路
        }
      })

    }

    window.addEventListener('DOMContentLoaded', init)

  </script>
