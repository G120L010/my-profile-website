<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旋轉星球互動冒險遊戲</title>
  <style>
    /* 全域樣式重置，統一盒模型並禁用文字選取 */
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      user-select: none;
    }

    /* 文字標籤重置，使其顯示為行內區塊並清除預設的段落間距 */
    p,
    h1,
    h2,
    h3,
    h4 {
      display: inline-block;
      margin-block-start: 0em;
      margin-block-end: 0em;
      margin-inline-start: 0px;
      margin-inline-end: 0px;
      padding-inline-start: 0px;
    }

    /* 全域背景色為深藍色，並限制溢出行為以避免頁面回彈 */
    body {
      background-color: #006781;
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: contain;
    }

    /* 地圖快速傳送頂端指示條，固定寬度最大 600px 且 z-index 置高 */
    .location {
      position: absolute;
      top: 50px;
      width: 600px;
      max-width: 100%;
      height: 10px;
      background-color: white;
      z-index: 50;
    }

    /* 地圖定位節點分佈橫向排列內層容器 */
    .location_mark {
      position: absolute;
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* 地圖密點小色塊，平分寬度且以咖啡色顏色展示 */
    .location_mark>div {
      flex-grow: 1;
      height: 100%;
      background-color: #c3ac83;
    }

    /* 奇數點透明展示，形成間隔格柵效果 */
    .location_mark>div:nth-child(odd) {
      background-color: transparent;
    }

    /* 懸停時顏色變換並變成指針樣式提示可點擊 */
    .location_mark>div:hover {
      background-color: #7ce6f0;
      cursor: pointer;
    }

    /* 地圖進度指針元素，像素圖樣式以底部中心為轉動原點 */
    .pointer {
      width: 24px;
      height: 30px;
      position: absolute;
      bottom: 5px;
      background-size: 24px 30px;
      background-image: url(../images/games/rotatingplanet01.jpg);
      transform-origin: center bottom;
    }

    /* 展示分層、主外層、內層容器的共用居中定位樣式 */
    .display_wrapper,
    .wrapper,
    .inner_wrapper {
      position: absolute;
      top: 0px;
      left: 0px;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 遊戲主畫布容器，裁切溢出內容 */
    .wrapper {
      overflow: hidden;
    }

    /* 調查物體彈出視窗全層，預設不攔截滑鼠事件，0.3s 過渡且縱向排列置於高層級 100 */
    .display_wrapper {
      pointer-events: none;
      transition: 0.3s;
      flex-direction: column;
      z-index: 100;
    }

    /* 像素展示元素樣式，開啟像素渲染模式 */
    .img_display {
      image-rendering: pixelated;
    }

    /* 展示視窗展開時按鈕與關閉鈕可操作樣式 */
    .display_wrapper.display button,
    .display_wrapper.display .close {
      pointer-events: auto;
      opacity: 1;
    }

    /* 展示視窗展開狀態，深藍半透明背景且開啟互動 */
    .display_wrapper.display {
      pointer-events: auto;
      background-color: #032041d7;
    }

    /* 展示內層容器，預設定位於視窗下方外，展開時滑入可見區域 */
    .inner_wrapper {
      pointer-events: none;
      top: 100%;
      transition: 0.3s;
      flex-direction: column;
    }

    /* 展示內層容器展開時回到畫面上方 */
    .display_wrapper.display .inner_wrapper {
      top: 0px;
    }

    /* 展示視窗內按鈕的共用樣式，圓角顯示並加滑鼠指針樣式 */
    .display_wrapper button {
      padding: 14px 18px;
      border: 0px;
      background-color: #c3ac83;
      border-radius: 50px;
      margin-top: 20px;
      font-size: 18px;
      cursor: pointer;
    }

    /* 關閉按鈕特殊樣式，白色背景且上方留有較多的間距 */
    .display_wrapper button.close {
      background-color: white;
      margin-top: 40px;
    }

    /* 懸停按鈕時顏色切換為亮青色 */
    .display_wrapper button:hover {
      background-color: #7ce6f0;
    }

    /* 星球圓面左半部紋路圖案的前元素，使用重複背景回形圖案 */
    .circle::before {
      content: '';
      width: 220px;
      height: 440px;
      position: absolute;
      left: 0px;
      border-top-left-radius: 220px;
      border-bottom-left-radius: 220px;
      background-image: url(../images/games/rotatingplanet02.jpg);
      background-size: 220px 32px;
      background-repeat: repeat-y;
      opacity: 0.4;
      transition: 2s;
    }

    /* 星球表面元素共用樣式，以底部中心為轉動原點 */
    .element {
      position: absolute;
      transform-origin: bottom center;
      color: hotpink;
      display: flex;
      flex-direction: column;
      background-color: transparent !important;
    }

    /* 對話狀態中元素文字變黑色 */
    .element.change {
      color: black;
    }

    /* 小熊角色像素圖樣式，絕對定位於底部且以底部中心為轉動原點 */
    .bear {
      position: absolute;
      background-image: url(../images/games/rotatingplanet03.jpg);
      background-repeat: no-repeat;
      background-size: 224px 32px;
      bottom: 0px;
      left: 0px;
      width: 224px;
      height: 32px;
      z-index: 1;
      transform-origin: center bottom;
    }

    /* 小熊包裝容器，絕對定位且以底部中心為轉動原點 */
    .bear_wrapper {
      position: absolute;
      width: 32px;
      height: 64px;
      overflow: hidden;
      transform-origin: center bottom;
    }

    /* 小熊頂部預警指示的後元素，預設透明，接觸元素時顯示圖片 */
    .bear_wrapper::after {
      position: absolute;
      top: 10px;
      color: white;
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      background-repeat: no-repeat !important;
      background-size: 32px !important;
      content: '';
      background-image: url(../images/games/rotatingplanet04.jpg);
      opacity: 0;
      transition: 0.1s;
    }

    /* 小熊容器進入警呀狀態時顯示預警圖片並移至頂部 */
    .bear_wrapper.alert::after {
      top: 0px;
      opacity: 1;
    }

    /* 小熊包裝容器內的小熊像素圖定位導元素 */
    .bear_wrapper>div {
      position: absolute;
      bottom: 0px;
      height: 32px;
      width: 32px;
    }

    /* 小熊面對右方時水平鏡像，實現對稱圖片 */
    .right {
      transform: scale(-1, 1);
    }

    .tree {
      background: url(../images/games/rotatingplanet05.jpg);
    }

    .tree.gold {
      background: url(../images/games/rotatingplanet06.jpg);
    }

    .tree.navy {
      background: url(../images/games/rotatingplanet07.jpg);
    }

    .tree.white {
      background: url(../images/games/rotatingplanet08.jpg);
    }

    .talking_tree {
      background: url(../images/games/rotatingplanet09.jpg);
    }

    .talking_tree.white {
      background: url(../images/games/rotatingplanet10.jpg);
    }

    .talking_tree.navy {
      background: url(../images/games/rotatingplanet11.jpg);
    }

    .talking_tree.gold {

    }

    .house1 {
      background: url(../images/games/rotatingplanet13.jpg);
    }

    .house2 {
      background: url(../images/games/rotatingplanet14.jpg);
    }

    .art {
      background: url(../images/games/rotatingplanet15.jpg);
    }

    .art.blue {
      background: url(../images/games/rotatingplanet16.jpg);
    }

    .bear_art {

    .panda_art {

    .kitten_art {
      background: url(../images/games/rotatingplanet19.jpg);

    .cactus.gold {
      background: url(../images/games/rotatingplanet24.jpg);
    }

    .cactus.navy {
      background: url(../images/games/rotatingplanet25.jpg);
    }

    .talking_cactus {
      background: url(../images/games/rotatingplanet26.jpg);
    }

    .talking_cactus.gold {
      background: url(../images/games/rotatingplanet27.jpg);
    }

    .talking_cactus.navy {
      background: url(../images/games/rotatingplanet28.jpg);
    }

    .npc {
      background: url(../images/games/rotatingplanet29.jpg);
    }

    .crystal {
      background: url(../images/games/rotatingplanet30.jpg);

    }

    .crystal_large {
      background: url(../images/games/rotatingplanet31.jpg);
      opacity: 0.7;

    .talking_crystal {
      background: url(../images/games/rotatingplanet32.jpg);

      background: url(../images/games/rotatingplanet34.jpg);

      background: url(../images/games/rotatingplanet35.jpg);

    .touch_wrapper {
      position: fixed;
      bottom: 0px;
      width: 100%;
      margin: 0 auto;
    }

    .touch_wrapper>div {
      position: relative;
      margin: 0 auto;
      padding: 10px;
      max-width: 700px;
      display: flex;
      justify-content: space-between;
    }

    .touch_control {
      position: relative;
      width: 160px;
      height: 160px;
      background-color: #0cb2c2;
      opacity: 0.8;
      border-radius: 50%;
      transition: 0.3s;
      background-image: url(../images/games/rotatingplanet36.jpg);
      image-rendering: pixelated;
      background-repeat: no-repeat !important;
      background-size: 160px !important;
    }

    .touch_circle {
      position: absolute;
      top: 0px;
      left: 0px;
      border-radius: 50%;
      width: 90px;
      height: 90px;
      background-position: center;
      background-image: url(../images/games/rotatingplanet37.jpg);
      opacity: 0.6;
      image-rendering: pixelated;
      background-repeat: no-repeat !important;
      background-size: 96px !important;
      transform: translate(35px, 35px);
      cursor: grab;
    }

    .action_button {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-position: center;
      background-image: url(../images/games/rotatingplanet38.jpg);
      background-color: #d8d7d7ba;
      image-rendering: pixelated;
      background-size: 48px !important;
      opacity: 1;
      transition: 0.3s;
      z-index: 300;
    }

    .action_button:hover {
      opacity: 0.5;
    }

    .display_none {
      opacity: 0;
      pointer-events: none;
    }

    .element {
      position: absolute;
      background-repeat: no-repeat !important;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #09274e;
      transition: 2s;
    }

    .background:after {
      background: url(../images/games/rotatingplanet39.jpg);
      background-repeat: repeat;
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      animation: bg_scrolling infinite linear 15s;
    }

    @keyframes bg_scrolling {
      0% {
        background-position: 0 200px;
      }

      100% {
        background-position: 200px 0;
      }
    }

    .background.light {
      background-color: #7ce6f0;
      color: #ffffff05;
    }

    .sensei_wrapper {
      height: 48px;
      position: absolute;
      top: 90px;
      width: 600px;
      display: flex;
      justify-content: space-between;
      transition: 0.3s ease;
      pointer-events: none;
    }

    .sensei {
      width: 48px;
      height: 48px;
      background-color: #0cb2c2;
      border-radius: 50%;
      background-position: center;
      background-image: url(../images/games/rotatingplanet40.jpg);
      background-size: 32px !important;
      image-rendering: pixelated;
      background-repeat: no-repeat !important;
      transition: transform 0.3s;
    }

    .sensei.talking {
      background-image: url(../images/games/rotatingplanet41.jpg);
    }

    .speech_wrapper {
      position: relative;
      width: calc(100% - 48px);
      transition: 0.2s ease;
      pointer-events: none;
    }

    .speech_bubble::before {
      position: absolute;
      left: -16px;
      top: 15px;
      background-image: url(../images/games/rotatingplanet42.jpg);
      image-rendering: pixelated;
      background-repeat: no-repeat !important;
      width: 16px;
      height: 18px;
      background-size: 16px 18px !important;
      content: '';
    }

    .speech_bubble {
      position: absolute;
      right: 0px;
      width: calc(100% - 25px);
      min-height: 100%;
      background: white;
      padding: 5px 20px 5px 8px;
      transition: 0.3s ease;
    }

    .speech_wrapper::after {
      background: url(../images/games/rotatingplanet43.jpg);
      image-rendering: pixelated;
      background-size: 16px;
      width: 16px;
      height: 16px;
      position: absolute;
      top: 4px;
      right: 4px;
      content: '';
      pointer-events: auto;
      cursor: pointer;
    }

    .speech_wrapper:hover::after {
      filter: invert(100%);
    }

    .sensei_wrapper.off .speech_wrapper {
      position: absolute;
      height: 48px;
      right: 10px;
      width: 0px;
    }

    .sensei_wrapper.off .speech_wrapper::after {
      background: none;
    }

    .sensei_wrapper.off .speech_bubble {
      padding: 0px;
    }

    .sensei_wrapper.off .speech_bubble::before {
      opacity: 0;
    }

    .sensei_wrapper.off .sensei {
      pointer-events: auto;
      cursor: pointer;
      transform: rotate(360deg);
    }


    /* 響應式排版媒體查詢 */

    @media screen and (min-width:0px) {
      .sensei_wrapper {
        max-width: calc(100% - 20px);
      }

      .circle_wrapper {
        width: 400px;
        height: 300px;
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .circle {
        border-radius: 220px;
        width: 440px;
        height: 440px;

        ;

      }

      .caption {
        color: white;
        max-width: 100%;
        margin-top: 20px;
        padding: 0 10px;
        text-align: center;

        line-height: 1.4;
      }

      .sensei_wrapper.off {
        max-width: 100%;
        justify-content: end;
        padding-right: 10px;
      }
    }

    @media screen and (min-width:400px) {
      .circle_wrapper {
        width: 100%;
      }
    }

    @media screen and (min-width:600px) {

      .sensei_wrapper {
        max-width: 100%;
      }

      .sensei_wrapper.off {
        max-width: 100%;
        padding-right: 0px;
      }

      .circle_wrapper {
        width: 600px;
        height: 350px;
      }

      .caption {
        width: 600px;
      }

      .circle {
        bottom: -260px;
      }

    }

    /* 其他通用樣式定義 */

    .sign {
      position: absolute;
      bottom: 10px;

      color: rgb(255, 255, 255);

      opacity: 0.8;
      z-index: 999;
      pointer-events: none;
    }

    a {
      color: rgb(255, 255, 255);
      text-decoration: none;
      text-transform: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

      <!-- 目前角色在地圖中的橫向進度指針 -->
      <div class="pointer"></div>
    </div>
    <!-- 提示導師 NPC 人物對話框容器 -->
    <div class="sensei_wrapper">
      <!-- 導師 NPC 點擊對話人物圖片元素 -->

      </div>
      <!-- 對話泡泡框與文字展示外層 -->

        <div class="speech_bubble"></div>

    </div>

    <!-- 旋轉星球畫布主包裝容器 -->
    <div class="circle_wrapper">
      <!-- 場景動態背景（光暗交替樣式） -->
      <div class="background light"></div>

      <div class="circle"></div>
    </div>

    <!-- 調查物體展示彈出視窗遮罩外層 -->

      <!-- 展示視窗定位核心容器 -->
      <div class="inner_wrapper">
        <!-- 圖片詳情展示畫布區 -->

        <!-- 物體介紹詳細內文 -->

        <!-- 關閉詳情彈窗按鍵 -->

    const mapDataKeys = Object.keys(mapData)
    // const indicator = document.querySelector('.indicator')
    const cellD = 32
    const circle = document.querySelector('.circle')
    const circleWrapper = document.querySelector('.circle_wrapper')
    const pointer = document.querySelector('.pointer')
    const background = document.querySelector('.background')
    const control = document.querySelector('.touch_circle')

    const displayWrapper = document.querySelector('.display_wrapper')
    const displays = document.querySelectorAll('.display')
    const sensei = document.querySelector('.sensei')
    const speechBubble = document.querySelector('.speech_bubble')
    // 計算給定半徑之半圓周長的數學公式輔助函式
    const halfCircumference = r => Math.PI * r
    // 判斷傳入參數是否為數值型態的類型檢查輔助函式
    const isNum = x => typeof x === 'number'

    // 同時批量設定目標 DOM 元素的尺寸與座標定位參數的函式
    const setTargetParams = ({ target, x, y, w, h }) => {
      const { style } = target
      if (isNum(x)) style.left = `${x}px`
      if (isNum(w)) style.width = `${w}px`
      if (isNum(y)) style.top = `${y}px`
      if (isNum(h)) style.height = `${h}px`
    }

    // 將特定場景關卡索引下的所有擺設物件實例化渲染到星球表面的載入控制函式
    const placeElements = index => mapData[index].forEach(element => placeElement(element, index))

    // 依據物件角度、半徑與層級參數，將單個擺設元素定位貼附於星球圓周的繪製函式
    const placeElement = (element, i) => {
      const newElement = document.createElement('div')
      const offset = i % 2 === 0 ? 0 : 180
      newElement.className = `element ${element.element} ${element.color || ''}`
      circle.append(newElement)
      const { w, h, offset: o } = elements[element.element]
      const vertOffset = h - (element.offset || o || 5)

      setTargetParams({ target: newElement, w, h })
      Object.assign(newElement.style, {
        transform: `translate(${220 - (w / 2)}px, ${-vertOffset}px) rotate(${element.angle + offset}deg)`,
        zIndex: element.offset || o || 5,
        backgroundSize: `${w}px ${h}px !important`,
        transformOrigin: `center ${220 + vertOffset}px`
      })
      element.placed = newElement
    }


    // 修改角色雪碧圖橫向偏移量以實現影格步進動畫的更新函式
    const setSpritePos = (num, actor, sprite) => {
      actor.spritePos = num
      sprite.style.marginLeft = `${num}px`
    }

    // 依據前進方向更新角色雪碧圖朝向狀態並切換動作影格的轉向動畫控制函式
    const turnSprite = ({ e, actor, animate }) => {
      const dir = e
      const { sprite, frameOffset } = bearData
      const frames = {
        r: [4, 6, 5, 'add'],
        l: [4, 6, 5, 'remove'],
        u: [2, 2, 3, 'toggle'],
        d: [0, 0, 1, 'toggle']
      }
      let m = -cellD
      if (!frames[dir]) return
      m = animate ? m * frames[dir][0 + frameOffset] : m * frames[dir][2]
      bearData.frameOffset = frameOffset === 0 ? 1 : 0
      sprite.parentNode.classList[frames[dir][3]]('right')
      actor.animationTimer.forEach(timer => clearTimeout(timer))
      setSpritePos(m, actor, sprite)
    }

    // 停止小熊移動狀態並切換為當前方向靜止影格的停止函式
    const stopBear = () => {
      turnSprite({ e: circleData.key, actor: bearData })
      circleData.key = null
    }

    // 在地圖邊界循環往復切換前一關或後一關關卡索引的循環運算函式
    const returnNextOrPrev = current => {
      return current === -1
        ? mapDataKeys.length - 1
        : current === mapDataKeys.length
          ? 0
          : current
    }

    // 當星球旋轉超出 360 度邊界時，重設旋轉角度值以防數值無限累積的計算函式
    const returnPos = current => {
      return current === mapDataKeys.length * 180
        ? mapDataKeys.length * -180
        : current === mapDataKeys.length * -180
          ? 0
          : current
    }

    // 限制並約束小熊在星球表面垂直走動深度的邊界約束函式
    const returnVerticalPos = current => {
      return current < -47
        ? -47
        : current > 120
          ? 120
          : current
    }

    // 配合視差，在小熊向左右旋轉前進時動態在後台加載相鄰關卡物件的加載機制函式
    const populateCircle = key => {
      const { mapIndex } = circleData
      const indexToAdd = key === 'r' ? returnNextOrPrev(mapIndex + 1) : returnNextOrPrev(mapIndex - 1)
      mapDataKeys.forEach(index => {
        if (index !== `${mapIndex}`) mapData[index].forEach(element => element.placed?.remove())
      })
      placeElements(indexToAdd)
    }

    // 根據目前星球旋轉角度，換算出對應整張地圖中精確進度比率與索引的運算函式
    const currentPos = pos => {
      return pos === 0
        ? 0
        : pos > 0
          ? (pos / -180) + mapDataKeys.length
          : pos / -180
    }

    // 根據星球當前旋轉位置，同步更新地圖進度條指針橫向坐標的指引控制函式
    const movePointer = pos => {
      const { width } = circleWrapper.getBoundingClientRect()
      const pointerPos = (currentPos(pos - 90) / mapDataKeys.length) * width
      pointer.style.transform = `translateX(${(pointerPos > width ? pointerPos - width : pointerPos) - 12}px)`
    }

    // 伴隨關卡切換而同步改變天空背景光暗樣式效果的視覺切換函式
    const changeBackground = pos => {
      background.classList[Math.floor(pos) % 2 === 0 ? 'add' : 'remove']('light')
    }

    // 判斷兩數值之絕對值差是否小於給定緩衝範圍的數學判定輔助函式
    const withinBuffer = ({ a, b, buffer }) => Math.abs(a - b) < buffer

    // 在旋轉前進過程中持續更新星球當前旋轉角度、地圖進度與背景圖層的狀態同步函式
    const updateElements = () => {
      const trigger = [89, 269, 91, 271]
      const { key } = circleData

      circleData.pos += config[key]
      circleData.pos = returnPos(circleData.pos)
      circleData.mapIndex = Math.round(currentPos(circleData.pos))
      circleData.mapIndex = returnNextOrPrev(circleData.mapIndex)

      if (trigger.includes(Math.abs(circleData.angle))) populateCircle(key)

      movePointer(circleData.pos)
      changeBackground(circleData.mapIndex)
      if (Math.abs(circleData.angle) === 360) circleData.angle = 0

      // 開發偵錯時的狀態輸出指標
      // indicator.innerHTML = `angle: ${circleData.angle} pos:${circleData.pos} prev: ${returnNextOrPrev(circleData.mapIndex - 1)} current: ${circleData.mapIndex} next:${returnNextOrPrev(circleData.mapIndex + 1)}`
    }

    // 計算極坐標以令小熊始終挺立在旋轉中的星球表面的定位變換函式
    const positionBear = angle => {
      bearData.bear.style.transformOrigin = `center ${220 - (bearData.vertPos)}px`
      bearData.bear.style.transform = `translate(${220 - 16}px, ${bearData.vertPos}px) rotate(${angle}deg)`
    }

    // 控制星球依據操縱按鍵產生旋轉，並連帶更新小熊立足點角度與地圖狀態的旋轉控制核心函式
    const rotateCircle = () => {
      circleData.angle += config[circleData.key]
      circle.style.transform = `rotate(${circleData.angle}deg)`

      positionBear(-circleData.angle)
      updateElements()
    }

    // 改變小熊垂直走向的 CSS z-index 深度與旋轉原點，以實現縱向景深走動的控制函式
    const moveBearVertically = () => {
      bearData.bear.style.zIndex = bearData.vertPos + 64
      positionBear(-circleData.angle)
    }


    // 碰撞偵測核心邏輯：判斷小熊當前位置是否與任何場景可互動元件或入口發生重合
    const elementInContact = () => {
      const angleWithinCurrentMap = Math.round((currentPos(circleData.pos - 90) % 1) * 180)

      return mapData[circleData.mapIndex].map(element => {
        const { zIndex: elementPos } = element.placed.style
        const { zIndex: bearPos } = bearData.bear.style
        if (
          withinBuffer({
            a: element.angle, b: angleWithinCurrentMap,
            buffer: (elements[element.element].w / halfCircumference(220 - elementPos)) * 90
          }) &&
          withinBuffer({
            a: elementPos, b: bearPos,
            buffer: 15
          }) &&
          (circleData.key === 'u' && +elementPos < +bearPos || circleData.key === 'd' && +elementPos > +bearPos)
        ) return element
        return null
      }).filter(element => element)[0]
    }

    // 依據互動事件是否有配對詳情圖案，動態展開或收闔詳情展示遮罩的函式
    const displayOrHideImage = () => {
      if (circleData.activeEvent?.display?.image) {
        const { w, h, image } = circleData.activeEvent.display.image
        setTargetParams({ target: displays[0], w, h })
        displays[0].style.backgroundSize = `${w}px ${h}px`
        displays[0].className = `img_display display ${image}`
        displays[0].style.marginBottom = '5px'
      } else {
        setTargetParams({ target: displays[0], w: 0, h: 0 })
        displays[0].className = 'img_display display'
        displays[0].style.marginBottom = '0px'
      }
    }

    // 初始化物理與影格定時器，持續監聽按鍵以循環旋轉星球與播放小熊走路動畫的核心步進函式
    const moveBearAndCircle = key => {
      clearInterval(circleData.interval)
      circleData.key = key
      circleData.interval = setInterval(() => {
        if (!circleData.key) {
          clearInterval(circleData.interval)
        } else {
          circleData.activeEvent = elementInContact()
          if (!circleData.activeEvent) bearData.bear.classList.remove('alert')
          if (['l', 'r'].includes(key)) {
            rotateCircle()
          } else if (['u', 'd'].includes(key)) {
            if (!circleData.activeEvent) {
              bearData.vertPos += config[key]
              bearData.vertPos = returnVerticalPos(bearData.vertPos)
              moveBearVertically()
            } else if (key === 'u' && circleData.activeEvent.display) {
              circleData.eventActivated = true
              displayOrHideImage()
              bearData.bear.classList.add('alert')
            }
          }
        }
      }, 1000 / 60)
      clearInterval(bearData.interval)
      bearData.interval = setInterval(() => {
        if (!circleData.key) {
          clearInterval(bearData.interval)
        } else {
          turnSprite({ e: circleData.key, actor: bearData, animate: true })
        }
      }, 100)
    }


    // 統一處理鍵盤方向鍵與 Enter 鍵按下時，觸發角色走路、停止或啟動調查詳情面板的路由處理函式
    const handleKey = ({ e, letter, enter }) => {
      if ((e?.key === 'Enter' || enter) && circleData.activeEvent?.display && bearData.direction === 'u') {
        senseiData.userProgress.investigate = true
        bearData.pause = !bearData.pause
        displayWrapper.classList.toggle('display')

        // 使關閉按鈕失去焦點，以防止按下 Enter 鍵時發生誤觸發
        if (!displayWrapper.classList.contains('display')) displays[3].blur()
        displays[1].innerHTML = circleData.activeEvent.display.caption || ''
        displays[2].innerHTML = circleData.activeEvent.display.link || ''
        displays[3].innerHTML = circleData.activeEvent.display.button || '關閉'
      } else if (!bearData.pause) {
        const key = e?.key.replace('Arrow', '').toLowerCase()[0] || letter
        senseiData.userProgress.walk = true
        bearData.direction = key
        if (circleData.key !== key) moveBearAndCircle(key)
      }
    }

    // 實例化小熊角色 DOM 結構並設置其初始旋轉變形中心點的初始化函式
    const addBear = () => {
      bearData.bear = document.createElement('div')
      const { bear } = bearData
      circle.append(bear)
      bear.classList.add('bear_wrapper')
      bear.innerHTML = '<div><div class="bear"></div></div>'
      bearData.sprite = bear.childNodes[0].childNodes[0]
      bear.style.transform = `translate(${220 - 16}px, ${10}px) rotate(0deg)`
      bear.style.transformOrigin = `center ${220 - 10}px`
    }

    // 兩點之間直線歐幾里得幾何距離計算的數學輔助函式
    const distanceBetween = (a, b) => Math.round(Math.sqrt(Math.pow((a.x - b.x), 2) + Math.pow((a.y - b.y), 2)))

    // 處理虛擬搖桿拖曳位移量並將其轉化為對應前進方向的物理計算函式
    const drag = (target, pos, x, y) => {
      pos.a = pos.c - x
      pos.b = pos.d - y
      const newX = target.offsetLeft - pos.a
      const newY = target.offsetTop - pos.b
      if (distanceBetween({ x: 0, y: 0 }, { x: newX, y: newY }) < 40) {
        setTargetParams({ target, x: newX, y: newY })
        touchControl.direction = Math.abs(newX) < Math.abs(newY)
          ? newY < 0 ? 'u' : 'd'
          : newX < 0 ? 'l' : 'r'
      }
    }

    // 兼容處理滑鼠與觸控事件獲取當前網頁 client 座標的輔助函式
    const client = (e, type) => e.type[0] === 'm' ? e[`client${type}`] : e.touches[0][`client${type}`]
    // 獲取四捨五入 client 座標整數數值的輔助函式
    const roundedClient = (e, type) => Math.round(client(e, type))

    // 針對行動端虛擬方向控制器綁定完整抓取、拖曳滑動與釋放事件的控制函式
    const addTouchAction = (target, handleKeyAction) => {
      const pos = { a: 0, b: 0, c: 0, d: 0 }

      const onGrab = e => {
        pos.c = roundedClient(e, 'X')
        pos.d = roundedClient(e, 'Y')
        mouse.up(document, 'add', onLetGo)
        mouse.move(document, 'add', onDrag)
        touchControl.active = true
        touchControl.timer = setInterval(() => {
          if (touchControl.active) handleKeyAction({ letter: touchControl.direction })
        }, 200)
      }
      const onDrag = e => {
        const x = roundedClient(e, 'X')
        const y = roundedClient(e, 'Y')
        drag(target, pos, x, y)
        pos.c = x
        pos.d = y
      }
      const onLetGo = () => {
        mouse.up(document, 'remove', onLetGo)
        mouse.move(document, 'remove', onDrag)
        target.style.transition = '0.2s'
        setTargetParams({ target, x: 0, y: 0 })
        setTimeout(() => {
          target.style.transition = '0s'
        }, 200)
        clearInterval(touchControl.timer)
        touchControl.active = false
        stopBear()
      }
      mouse.down(target, 'add', onGrab)
    }

    // 監聽視窗尺寸改變時縮放遊戲畫面比例並重算小熊與指針定位的自適應自評估函式
    const resize = () => {
      const { innerWidth } = window
      circleWrapper.style.transform = innerWidth < 400 ? `scale(${innerWidth / 400})` : 'scale(1)'
      moveBearVertically()
      movePointer(circleData.pos)
    }

    // 傳送機制函式：將小熊與星球重置旋轉角度，清除並加載對應地圖的極速傳送函式
    const warpToLocation = i => {
      setTimeout(() => senseiData.userProgress.location = true, 1000)
      circleData.pos = i * -180 + 1
      circleData.angle = i === 0
        ? 270
        : i === 1
          ? 90
          : i % 2 === 0
            ? -90
            : -270
      bearData.vertPos = 10
      positionBear(-circleData.angle)
      circle.style.transform = `rotate(${circleData.angle - 90}deg)`
      circle.style.transition = '0.2s'
      setTimeout(() => circle.style.transform = `rotate(${circleData.angle}deg)`, 50)
      setTimeout(() => circle.style.transition = '0s', 200)
      circleData.mapIndex = i
      mapDataKeys.forEach(i => mapData[i].forEach(element => element.placed?.remove()))
      placeElements(i)
      movePointer(circleData.pos)
      populateCircle('r')
      changeBackground(i)
      stopBear()
    }


    // 導師 NPC 互動邏輯開始

    // NPC 說話逐字跑馬燈打字機特效與頭像說話擺動動畫的定時器播放函式
    const displayTextGradual = (t, i) => {
      speechBubble.innerHTML = t.slice(0, i)
      if (i % 5 === 0) sensei.classList.toggle('talking')
      if (i < t.length) {
        senseiData.textTimer = setTimeout(() => {
          displayTextGradual(t, i + 1)
        }, 20)
      } else {
        sensei.classList.remove('talking')
      }
    }

    // 根據文字長度，動態延遲運算導師說話停留時間長度的輔助函式
    const senseiTiming = (buffer, key) => senseiData[key || 'instruction'].length * 20 + buffer * 1000

    // 偵測玩家的成就進度（調查、走路等），動態更新導師泡泡框內文說話提示的指引函式
    const displayInstruction = () => {
      if (senseiData.active) {
        setInstruction()
        displayTextGradual(senseiData.instruction, 0)
        senseiData.loopTimer = !senseiData.complete
          ? setTimeout(() => displayInstruction(), senseiTiming(8))
          : setTimeout(() => closeSensei(), senseiTiming(6))
      }
    }

    // 點擊導師頭像時觸發呼出泡泡框並主動說出問候語與任務指引的觸發函式
    const activateSensei = () => {
      speechBubble.parentNode.parentNode.classList.remove('off')
      senseiData.active = true
      senseiData.textTimer = setTimeout(() => {
        displayTextGradual(senseiData.greetings, 0)
        senseiData.loopTimer = setTimeout(() => displayInstruction(), senseiTiming(3, 'greetings'))
      }, 400)
    }

    // 清除泡泡框說話定時器並收闔對話提示的關閉函式
    const closeSensei = () => {
      ;['textTimer', 'loopTimer'].forEach(k => clearTimeout(senseiData[k]))
      sensei.classList.remove('talking')
      speechBubble.innerHTML = ''
      speechBubble.parentNode.parentNode.classList.add('off')
      senseiData.active = false
    }

    // 讀取玩家關卡成就足跡進度，匹配篩選出下一條適配對話文字的過濾函式
    const setInstruction = () => {
      const { userProgress: p } = senseiData
      const instructionKey = Object.keys(p).map(k => !p[k] && k).filter(k => k)[0]
      senseiData.instruction = senseiData.instructions[instructionKey]
      if (instructionKey === 'complete') senseiData.complete = true
    }

    // 導師 NPC 互動邏輯結束


    document.querySelector('.location_mark').innerHTML = mapDataKeys.map(() => `<div class="location_link"></div>`).join('')
    document.querySelectorAll('.location_link').forEach((link, i) => {
      link.addEventListener('click', () => warpToLocation(i))
    })
    window.addEventListener('keydown', e => handleKey({ e }))
    window.addEventListener('keyup', () => {
      turnSprite({ e: circleData.key, actor: bearData })
      circleData.key = null
    })
      ;[actionButton, displays[3]].forEach(ele => ele.addEventListener('click', () => handleKey({ enter: true })))
    speechBubble.parentNode.addEventListener('click', closeSensei)
    sensei.addEventListener('click', activateSensei)
    window.addEventListener('resize', resize)

    addTouchAction(control, handleKey)
    placeElements(0)
    addBear()
    rotateCircle()
    handleKey({ letter: 'd' })
    stopBear()
    resize()
    Object.keys(senseiData.userProgress).forEach(k => senseiData.userProgress[k] = false)
    displayTextGradual(senseiData.intro, 0)
    senseiData.loopTimer = setTimeout(() => displayInstruction(), senseiTiming(3, 'intro'))
  </script>
</body>

</html>
