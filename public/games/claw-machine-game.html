<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素夾娃娃機小遊戲</title>
  <style>
    /* 全域樣式重置，統一盒模型計算並清除僞元素預設間距 */
    *,
    ::before,
    ::after {
      box-sizing: border-box;
    }

    /* 全域背景色設定，並定義全站主要顏色 CSS 變數 */
    body {
      padding: 0;
      margin: 0;
      font-family: sans-serif;
      background-color: #84dfe2;
      --brown: #57280f;
      --blue: #33a5da;
      --dark-blue: #3a94b7;
      --machine-color: #32c2db;
      --machine-width: 160px;
      --m: 2;
    }

    /* 全站内容居中排列的主容器，高度與視窗等高且最小高度 600px */
    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      min-height: 600px;
      flex-direction: column;
    }

    /* 像素渲染類元素的尺寸計算公式，使用 --w、--h 與 --m 背景縮放變數統一計算 */
    .pix,
    .pix::before,
    .pix::after {
      width: calc(var(--w) * var(--m));
      height: calc(var(--h) * var(--m));
      image-rendering: pixelated;
      background-size: calc(var(--w) * var(--m)) calc(var(--h) * var(--m));
    }

    /* 像素類元素的偽元素絕對定位設定，不填內容匹配背景圖片 */
    .pix::before,
    .pix::after {
      position: absolute;
      content: '';
    }

    /* 娃娃機主體框架容器，縱向排列且包含外圍邊框 */
    .claw-machine {
      display: flex;
      flex-direction: column;
      border: 2px solid var(--brown);
      overflow: hidden;
    }

    /* 頂部已抓取玩具展示的收集箱容器，動態計算寬度與上方位置 */
    .collection-box {
      --h: 32px;
      width: calc(var(--m) * var(--machine-width));
      margin: calc(var(--m) * var(--h) * -1 - 10px) 0 24px;
      display: flex;
      align-items: bottom;
      justify-content: start;
    }

    /* 收集箱中各玩具位置包裝容器，平分寬度 */
    .collection-box .toy-wrapper {
      position: relative;
      width: calc(100% / 6);
      display: flex;
      align-items: end;
      justify-content: center;
    }

    /* 收集箱內玩具的偽元素定位至容器底部展示 */
    .collection-box .toy-wrapper .toy::after {
      top: auto;
      bottom: 0;
    }

    /* 新增玩具擠入收集箱時的寬度漸變動畫樣式 */
    .toy-wrapper.squeeze-in {
      width: 0;
      animation: squeeze-in forwards 0.4s;
      animation-delay: 1.4s;
    }

    /* 新抓取的玩具擠入時寬度展開動畫幀 */
    @keyframes squeeze-in {
      0% {
        width: 0;
      }

      100% {
        width: calc(100% / 6);
      }
    }

    /* 玩具從上方落下至正常位置的動畫幀 */
    @keyframes show-toy-2 {
      0% {
        opacity: 0;
        transform: translateY(-100vh);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 收集箱內玩具元素的初始隱藏狀態，伴隨延遲動畫自上方墜落出現 */
    .toy-wrapper .toy {
      opacity: 0;
      transform: translateY(-100vh);
      animation: forwards show-toy-2 0.8s;
      animation-delay: 1s;
    }

    /* 娃娃機主體外層的半透明藍色過渡陰影漸層 */
    .claw-machine.show-overlay::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      background-color: var(--machine-color);
      opacity: 0.6;
      z-index: 6;
      pointer-events: none;
    }

    /* 娃娃機玻璃櫥窗主區域容器，包含機器寬度與高度變數 */
    .box {
      position: relative;
      background-color: #7fcfed;
      --w: var(--machine-width);
      --h: 180px;
    }

    /* 機器中間橫向隔板動畫前元素 */
    .box::before {
      background-color: var(--brown);
      top: calc(70px * var(--m));
      width: 100%;
      height: calc(var(--m) * 8px);
      z-index: 5;
    }

    /* 機器右側裝飾深藍色機器色垂直輪廓後元素 */
    .box::after {
      background-color: var(--machine-color);
      top: calc(70px * var(--m));
      right: 0px;
      width: calc(var(--m) * 8px);
      height: calc(var(--m) * 170px);
      z-index: 2;
    }

    /* 機器上半部與下半部共用的寬度與高度基礎樣式 */
    .machine-top,
    .machine-bottom {
      position: absolute;
      width: 100%;
      --h: 70px;
      height: calc(var(--h) * var(--m));
    }

    /* 機器上半部（爪子及滑軸活動範圍），居中排列且置於層級 1 */
    .machine-top {
      top: 0;
      display: flex;
      align-items: center;
      z-index: 1;
    }

    /* 機器上半部玻璃藍色半透明覆蓋層後元素 */
    .machine-top::after {
      content: '';
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #70f7f372;
      z-index: 1;
    }

    /* 機器下半部（落物口區域），淡蓝f6 背景色 */
    .machine-bottom {
      bottom: 0;
      background-color: #def7f6;
    }

    /* 落物口點位元素，絕對定位於底部並展示小圖像素圖 */
    .collection-point {
      position: absolute;
      bottom: 0;
      background-image: url(../images/games/clawmachine01.jpg);
      --w: 44px;
      --h: 24px;
      z-index: 0;
    }

    /* 滑軸共用樣式，定位於左上角且具備 0.3s 過渡 */
    .rail {
      top: 0;
      left: 0;
      transition: 0.3s;
      border: solid var(--blue);
    }

    /* 水平滑軸樣式，白色背景上下有藍色框線 */
    .rail.hori {
      --h: 5px;
      width: 100%;
      background-color: #fff;
      border-width: 2px 0;
      z-index: 1;
    }

    /* 垂直滑軸樣式，絕對定位且左右各有藍色框線 */
    .rail.vert {
      position: absolute;
      --h: 70px;
      --w: 5px;
      background-color: #fff;
      border-width: 0 2px;
    }

    /* 爪子關節節點容器，絕對定位於左上角，具備 0.3s 過渡且置於負層級 */
    .arm-joint {
      position: absolute;
      top: 0;
      left: 0;
      --w: 5px;
      --h: 5px;
      transition: 0.3s;
      z-index: -1;
    }

    /* 關節節點的後元素，顯示小圓形接頭片 */
    .arm-joint::after {
      position: absolute;
      border: solid var(--blue) 2px;
      background-color: #fff;
      --w: 10px;
      --h: 10px;
      top: calc(var(--m) * var(--h) * -0.25);
      left: calc(var(--m) * var(--w) * -0.25);
    }

    /* 機械臂底部爪子最上面第一片的後元素圖片 */
    .arm::after {
      position: absolute;
      --w: 13px;
      --h: 7px;
      bottom: calc(var(--m) * -1px);
      left: calc(var(--m) * -3px);
      background-image: url(../images/games/clawmachine02.jpg);
    }

    /* 機械臂未夾到玩具時的空爪圖片狀態 */
    .arm.missed::after {
      background-image: url(../images/games/clawmachine03.jpg);
    }

    /* 娃娃機控制面板區域，深藍色背景且居右對齊文字 */
    .control {
      position: relative;
      --h: 60px;
      width: 100%;
      text-align: right;
      background-color: var(--dark-blue);
    }

    /* 控制面板裝飾蓋板基礎樣式，機器色背景且置於層級 4 */
    .cover {
      position: absolute;
      background-color: var(--machine-color);
      --top-size: calc(var(--m) * 20px);
      --bottom-size: calc(var(--m) * 10px);
      z-index: 4;
    }

    /* 頂部蓋板，展開全寬與固定高度 */
    .top {
      top: 0;
      width: 100%;
      height: calc(var(--m) * 16px);
    }

    /* 收集引導箭頭指示圖片元素，絕對定位於控制面板頂部左側 */
    .collection-arrow {
      position: absolute;
      left: calc(var(--m) * 21px);
      top: calc(var(--m) * 9px);
      --w: 8px;
      --h: 4px;
      background-image: url(../images/games/clawmachine04.jpg);
      filter: sepia(1) brightness(0.5);
    }

    /* 底部蓋板，咖啡色背景 */
    .bottom {
      bottom: 0px;
      width: 100%;
      height: calc(var(--m) * 8px);
      background-color: var(--brown);
    }

    /* 左側蓋板尺寸設定 */
    .left {
      bottom: 0px;
      left: 0px;
      height: calc(var(--m) * 170px);
      width: calc(var(--m) * 8px);
    }

    /* 右側蓋板尺寸設定，包含操作說明圖區域 */
    .right {
      top: 0;
      right: 0px;
      height: 100%;
      width: calc(var(--m) * 116px);
    }

    /* 操作說明圖片元素，絕對定位於蓋板內 */
    .instruction {
      position: absolute;
      --w: 51px;
      --h: 12px;
      background-image: url(../images/games/clawmachine05.jpg);
      top: calc(var(--m) * 34px);
      right: calc(var(--m) * 11px);
    }

    /* 機械臂桿樣式，絕對定位、白色背景且帶藍色邊框 */
    .arm {
      position: absolute;
      --w: 7px;
      --h: 28px;
      background-color: #fff;
      box-shadow: 0 0 0 2px var(--blue);
      transition: 0.3s;
      margin-top: calc(var(--m) * -1px);
      margin-left: calc(var(--m) * -1px);
    }

    /* 爬子整體平台容器，定位於機械臂底部 */
    .claws {
      position: absolute;
      --w: 3px;
      --h: 10px;
      bottom: calc(var(--m) * -5px);
      left: calc(var(--m) * 2.5px);
    }

    /* 爪子左右爪片的偽元素共用基礎尺寸與過渡 */
    .claws::before,
    .claws::after {
      top: 0;
      --w: 10px;
      --h: 16px;
      transition: 0.2s;
    }

    /* 爪子左爪片圖片與轉動原點設定 */
    .claws::before {
      left: calc(var(--m) * -10px);
      background-image: url(../images/games/clawmachine06.jpg);
      --close-angle: 45deg;
      transform-origin: top right;
    }

    /* 爪子右爪片圖片與轉動原點設定 */
    .claws::after {
      left: calc(var(--m) * 2.5px);
      background-image: url(../images/games/clawmachine07.jpg);
      --close-angle: -45deg;
      transform-origin: top left;
    }

    /* 機械臂張開時，左右爪子旋轉到指定角度實現張開動作 */
    .arm.open .claws::before,
    .arm.open .claws::after {
      rotate: var(--close-angle);
    }

    /* 爪子關節節點的前元素，顯示投影效果且依臂長動態縮放 */
    .arm-joint::before {
      --w: 20px;
      --h: 16px;
      transform: scale(var(--scale));
      margin-left: -15px;
      margin-top: var(--shadow-pos);
      background-image: url(../images/games/clawmachine08.jpg);
      background-image: url(../images/games/clawmachine09.jpg);
      z-index: -1;
      opacity: 0.5;
    }

    /* 操作按鈕樣式，預設不攔截滑鼠事件，需動態設置後才可操作 */
    button {
      position: relative;
      z-index: 5;
      --w: 24px;
      --h: 24px;
      margin: 12px 12px 0 0;
      border: 0;
      background-color: transparent;
      background-image: url(../images/games/clawmachine10.jpg);
      filter: sepia(1) brightness(0.4);
      pointer-events: none;
      cursor: pointer;
    }

    /* 水平移動按鈕旋轉 90 度將箭頭指向正確方向 */
    .hori-btn {
      transform: rotate(90deg);
    }

    /* 按鈕呼吸脈衝動畫樣式，表示當前可點擊的按鈕閃爍 */
    .active {
      animation: pulse infinite 1s;
      pointer-events: all;
    }

    /* 按鈕引導閃爍動畫幀，顏色在彩色與棕色間交替閃爍 */
    @keyframes pulse {

      0%,
      100% {
        filter: sepia(0);
      }

      50% {
        filter: sepia(1);
      }
    }

    /* 玩具展示狀態樣式，放大 3 倍並伴隨淡出動畫 */
    .toy.display {
      transform: scale(3);
      animation: forwards show-toy-1 0.8s;
      animation-delay: 1s;
    }

    /* 玩具主體基礎樣式，絕對定位並依領取角度旋轉 */
    .toy {
      position: absolute;
      transition: transform 1s, left 0.3s, top 0.3s;
      --m: 2;
      --w: 20px;
      --h: 27px;
      transform: rotate(var(--rotate-angle));
      pointer-events: none;
    }

    /* 玩具後元素帶出內容展示圖片用，預設內容為空 */
    .toy::after {
      content: '';
    }

    /* 小熊玩具後元素展示正常獨立狀態圖片 */
    .toy.bear::after {
      --w: 24px;
      --h: 30px;
      top: calc(var(--m) * -2px);
      left: calc(var(--m) * -2px);
      background-image: url(../images/games/clawmachine11.jpg);
    }

    /* 小熊玩具被爪子夾取時切換為抓起狀態圖片 */
    .toy.bear.grabbed::after {
      background-image: url(../images/games/clawmachine12.jpg);
    }

    /* 小熊玩具在收集箱中展示的小圖狀態 */
    .toy-wrapper .toy.bear::after {
      background-image: url(../images/games/clawmachine13.jpg);
    }

    /* 兔子玩具尺寸設定 */
    .toy.bunny {
      --w: 20px;
      --h: 29px;
    }

    /* 兔子玩具後元素正常展示圖片 */
    .toy.bunny::after {
      --w: 24px;
      --h: 32px;
      top: calc(var(--m) * -2px);
      left: calc(var(--m) * -2px);
      background-image: url(../images/games/clawmachine14.jpg);
    }

    /* 兔子玩具被夾取時切換圖片 */
    .toy.bunny.grabbed::after {
      background-image: url(../images/games/clawmachine15.jpg);
    }

    /* 兔子玩具收集箱內小圖展示 */
    .toy-wrapper .toy.bunny::after {
      background-image: url(../images/games/clawmachine16.jpg);
    }

    /* 石魔玩具後元素正常展示圖片 */
    .toy.golem::after {
      --w: 26px;
      --h: 30px;
      top: calc(var(--m) * -1px);
      left: calc(var(--m) * -3px);
      background-image: url(../images/games/clawmachine17.jpg);
    }

    /* 石魔玩具被夾取時切換圖片 */
    .toy.golem.grabbed::after {
      background-image: url(../images/games/clawmachine18.jpg);
    }

    /* 石魔玩具收集箱內小圖展示 */
    .toy-wrapper .toy.golem::after {
      background-image: url(../images/games/clawmachine19.jpg);
    }

    /* 黃瓜玩具尺寸設定 */
    .toy.cucumber {
      --w: 16px;
      --h: 28px;
    }

    /* 黃瓜玩具後元素正常展示圖片 */
    .toy.cucumber::after {
      --w: 16px;
      --h: 30px;
      top: calc(var(--m) * 1px);
      left: 0;
      background-image: url(../images/games/clawmachine20.jpg);
    }

    /* 黃瓜玩具被夾取時切換圖片 */
    .toy.cucumber.grabbed::after {
      background-image: url(../images/games/clawmachine21.jpg);
    }

    /* 黃瓜玩具收集箱內小圖展示 */
    .toy-wrapper .toy.cucumber::after {
      background-image: url(../images/games/clawmachine22.jpg);
    }

    /* 企鵝玩具尺寸設定 */
    .toy.penguin {
      --w: 24px;
      --h: 22px;
    }

    /* 企鵝玩具後元素正常展示圖片 */
    .toy.penguin::after {
      --w: 26px;
      --h: 24px;
      top: calc(var(--m) * -1px);
      left: calc(var(--m) * -1px);
      background-image: url(../images/games/clawmachine23.jpg);
    }

    /* 企鵝玩具被夾取時切換圖片 */
    .toy.penguin.grabbed::after {
      background-image: url(../images/games/clawmachine24.jpg);
    }

    /* 企鵝玩具收集箱內小圖展示 */
    .toy-wrapper .toy.penguin::after {
      background-image: url(../images/games/clawmachine25.jpg);
    }

    /* 機器人玩具尺寸設定 */
    .toy.robot {
      --w: 20px;
      --h: 30px;
    }

    /* 機器人玩具後元素正常展示圖片 */
    .toy.robot::after {
      --w: 24px;
      --h: 32px;
      top: calc(var(--m) * -1px);
      left: calc(var(--m) * -2px);
      background-image: url(../images/games/clawmachine26.jpg);
    }

    /* 機器人玩具被夾取時切換圖片 */
    .toy.robot.grabbed::after {
      background-image: url(../images/games/clawmachine27.jpg);
    }

    /* 機器人玩具收集箱內小圖展示 */
    .toy-wrapper .toy.robot::after {
      background-image: url(../images/games/clawmachine28.jpg);
    }

    /* 選中玩具樣式，開啟滑鼠事件以接受點擊選取 */
    .toy.selected {
      pointer-events: all;
    }

    /* 玩具抓取後從展示區縮小並淡出移除的動畫幀 */
    @keyframes show-toy-1 {
      0% {
        opacity: 1;
        transform: scale(3) translateY(0);
      }

      30% {
        opacity: 0;
      }

      100% {
        opacity: 0;
        transform: scale(1) translateY(-100vh);
      }
    }

    /* 控制面板內落物口定位點微調亮度與位置 */
    .control .collection-point {
      filter: brightness(0.8);
      bottom: calc(var(--m) * 8px);
    }

    /* 遊戲操作說明文字樣式，咖啡色加粗 */
    .game-instruction {
      color: var(--brown);
      margin-top: 16px;
      font-weight: bold;
    }

    .sign {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 20px;
      color: var(--brown);
      /* 根據遊戲主題微調 */
    }

    .sign a {
      color: inherit;
      text-decoration: none;
    }

    .sign a:hover {
      text-decoration: underline;
    }

    /* 手機版排版適配，調整收集箱外距以防頂部玩具被裁切 */
    @media screen and (max-width: 576px) {
      .collection-box {
        margin: 10px 0 15px;
      }
    }
  </style>
</head>

<body>
  <!-- 遊戲主要外殼容器 -->
  <div class="wrapper">
    <!-- 頂部展示已抓取玩具的收集箱 -->
    <div class="collection-box pix"></div>
    <!-- 娃娃機主體結構 -->
    <div class="claw-machine">
      <!-- 娃娃機玻璃櫥窗區域 -->
      <div class="box pix">
        <!-- 娃娃機上半部 (爪子及滑軌活動範圍) -->
        <div class="machine-top pix">
          <!-- 爪子關節節點 -->
          <div class="arm-joint pix">
            <!-- 伸縮機械臂 -->
            <div class="arm pix">
              <!-- 抓取夾爪 -->
              <div class="claws pix"></div>
            </div>
          </div>
          <!-- 垂直滑軌 -->
          <div class="rail vert pix"></div>
          <!-- 水平滑軌 -->
          <div class="rail hori pix"></div>
        </div>
        <!-- 娃娃機下半部 (落物口) -->
        <div class="machine-bottom pix">
          <!-- 櫥窗內的落物口點位 -->
          <div class="collection-point pix"></div>
        </div>
      </div>
      <!-- 娃娃機控制面板區域 -->
      <div class="control pix">
        <!-- 面板左側裝飾蓋板 -->
        <div class="cover left"></div>
        <!-- 水平移動控制按鈕 (箭頭向右) -->
        <button class="hori-btn pix"></button>
        <!-- 垂直移動與下爪按鈕 (按鍵向下) -->
        <button class="vert-btn pix"></button>
        <!-- 面板右側裝飾蓋板 -->
        <div class="cover right">
          <!-- 操作說明圖片區域 -->
          <div class="instruction pix"></div>
        </div>
        <!-- 控制器下方裝飾蓋板 -->
        <div class="cover bottom"></div>
        <!-- 控制器上方裝飾蓋板 -->
        <div class="cover top">
          <!-- 導引收集玩具的提示箭頭 -->
          <div class="collection-arrow pix"></div>
        </div>
        <!-- 控制面版上的取物口 -->
        <div class="collection-point pix"></div>
      </div>
    </div>
    <!-- 遊戲操作提示說明文字 -->
    <div class="game-instruction">
      ＊點擊閃爍的按鈕移動爪子，試著抓取玩具吧！
    </div>
  </div>
  <div class="sign">
    by HanJohn <a href="https://store.line.me/stickershop/author/5851575/zh-Hant?lang=zh-Hant" target="_blank"
      rel="noopener noreferrer">貼圖商店</a>
  </div>

  <script>
    // 儲存常用 DOM 元素與玩具陣列的物件
    const elements = {
      clawMachine: document.querySelector('.claw-machine'), // 娃娃機容器
      box: document.querySelector('.box'),                  // 櫥窗容器
      collectionBox: document.querySelector('.collection-box'), // 收集箱容器
      collectionArrow: document.querySelector('.collection-arrow'), // 收集箭頭
      toys: [], // 儲存所有玩具實例的陣列
    }

    // 遊戲運行時的狀態配置變數
    const settings = {
      targetToy: null,       // 當前被爪子鎖定或抓取的目標玩具
      collectedNumber: 0,    // 已成功收集到的玩具總數
    }

    // 像素渲染縮放倍率
    const m = 2
    // 定義各項玩具的像素寬高物理參數
    const toys = {
      bear: {
        w: 20 * m,
        h: 27 * m,
      },
      bunny: {
        w: 20 * m,
        h: 29 * m,
      },
      golem: {
        w: 20 * m,
        h: 27 * m,
      },
      cucumber: {
        w: 16 * m,
        h: 28 * m,
      },
      penguin: {
        w: 24 * m,
        h: 22 * m,
      },
      robot: {
        w: 20 * m,
        h: 30 * m,
      },
    }

    // 將所有玩具類型各取兩個組成隨機排序清單
    const sortedToys = [...Object.keys(toys), ...Object.keys(toys)].sort(
      () => 0.5 - Math.random(),
    )

    // 櫥窗邊緣與角落的安全緩衝邊距
    const cornerBuffer = 16

    // 爪子移動邊界的限制緩衝參數
    const machineBuffer = {
      x: 36,
      y: 16,
    }

    // 弧度轉換為角度的計算公式
    const radToDeg = rad => Math.round(rad * (180 / Math.PI))
    // 計算玩具網格排列的 X 座標索引位置
    const calcX = (i, n) => i % n
    // 計算玩具網格排列的 Y 座標索引位置
    const calcY = (i, n) => Math.floor(i / n)

    // 獲取娃娃機主容器的大小幾何參數
    const {
      width: machineWidth,
      height: machineHeight,
      top: machineTop,
    } = document.querySelector('.claw-machine').getBoundingClientRect()

    // 獲取娃娃機上方區塊的大小參數
    const {
      height: machineTopHeight
    } = document
      .querySelector('.machine-top')
      .getBoundingClientRect()

    // 獲取娃娃機底部及落物口區塊的大小的參數
    const {
      height: machineBottomHeight,
      top: machineBottomTop
    } = document
      .querySelector('.machine-bottom')
      .getBoundingClientRect()

    // 計算機械臂伸長的最大長度限制
    const maxArmLength = machineBottomTop - machineTop - machineBuffer.y

    // 角度正規化調整函式，將角度限縮在 0 至 360 度之間
    const adjustAngle = angle => {
      const adjustedAngle = angle % 360
      return adjustedAngle < 0 ? adjustedAngle + 360 : adjustedAngle
    }

    // 產生特定範圍內隨機整數的輔助函式
    const randomN = (min, max) => {
      return Math.round(min - 0.5 + Math.random() * (max - min + 1))
    }

    // 類別定義

    // 定義娃娃機控制按鈕實例的 Class 類別
    class Button {
      // 按鈕的建構子，配置各類點擊與長按事件監聽
      constructor({
        className,
        action,
        isLocked,
        pressAction,
        releaseAction
      }) {
        Object.assign(this, {
          el: document.querySelector(`.${className}`), // 綁定 DOM 按鈕元素
          isLocked, // 初始化鎖定旗標
        })
        this.el.addEventListener('click', action); // 掛載點擊事件
        ['mousedown', 'touchstart'].forEach(action =>
          this.el.addEventListener(action, pressAction), // 掛載壓下或觸摸事件
        );
        ['mouseup', 'touchend'].forEach(action =>
          this.el.addEventListener(action, releaseAction), // 掛載釋放或離開事件
        )

        if (!isLocked) this.activate() // 若未鎖定則直接激活按鈕
      }
      // 激活按鈕，使其可以互動並套用閃爍動畫
      activate() {
        this.isLocked = false
        this.el.classList.add('active')
      }
      // 鎖定按鈕，禁止互動並移除閃爍特效
      deactivate() {
        this.isLocked = true
        this.el.classList.remove('active')
      }
    }

    // 娃娃機內所有具備物理座標位移物件的 Base Class 類別
    class WorldObject {
      // 物件建構子，初始化基本座標、大小以及移動綁定
      constructor(props) {
        Object.assign(this, {
          x: 0, // X 軸座標
          y: 0, // Y 軸座標
          z: 0, // 層級深度 z-index
          angle: 0, // 傾斜偏轉角度
          transformOrigin: {
            x: 0,
            y: 0
          },
          interval: null,   // 位移定時器
          default: {},      // 儲存預設基礎物理資訊
          moveWith: [],     // 移動時隨之連帶同動的關聯物件串列
          el: props.className && document.querySelector(`.${props.className}`), // 綁定對應的 DOM 元素
          ...props,
        })
        this.setStyles() // 渲染物理樣式
        if (props.className) {
          const {
            width,
            height
          } = this.el.getBoundingClientRect()
          this.w = width  // 紀錄實際網頁寬度
          this.h = height // 紀錄實際網頁高度
        }
        ;
        ['x', 'y', 'w', 'h'].forEach(key => {
          this.default[key] = this[key] // 保存原始物理座標及尺寸
        })
      }
      // 套用當前物理物理座標、角度與寬高尺寸樣式至 DOM 元素上
      setStyles() {
        Object.assign(this.el.style, {
          left: `${this.x}px`,
          top: !this.bottom && `${this.y}px`,
          bottom: this.bottom,
          width: `${this.w}px`,
          height: `${this.h}px`,
          transformOrigin: this.transformOrigin,
        })
        this.el.style.zIndex = this.z // 設定層級
      }
      // 設定爪子的物理座標資訊
      setClawPos(clawPos) {
        this.clawPos = clawPos
      }
      // 設定 CSS transform-origin 旋轉定位重心的函式
      setTransformOrigin(transformOrigin) {
        this.transformOrigin =
          transformOrigin === 'center' ?
            'center' :
            `${transformOrigin.x}px ${transformOrigin.y}px`
        this.setStyles() // 重新套用樣式
      }
      // 停止當前位移定時器，並若有回呼排程則執行下一步行為的函式
      handleNext(next) {
        clearInterval(this.interval)
        if (next) next()
      }
      // 恢復移動至特定目標物理點的包裝函式
      resumeMove({
        moveKey,
        target,
        moveTime,
        next
      }) {
        this.interval = null
        this.move({
          moveKey,
          target,
          moveTime,
          next
        })
      }
      // 動態更新娃娃機陰影縮放與位置參數的函式
      resizeShadow() {
        elements.box.style.setProperty('--scale', 0.5 + this.h / maxArmLength / 2) // 根據長度調縮比例
      }
      // 控制物件向特定目標物理座標點進行平滑動畫位移的核心函式
      move({
        moveKey,
        target,
        moveTime,
        next
      }) {
        if (this.interval) {
          this.handleNext(next) // 若已有進行中任務則先處理完下一步
        } else {
          const moveTarget = target || this.default[moveKey] // 設定目標物理坐報
          this.interval = setInterval(() => {
            const distance =
              Math.abs(this[moveKey] - moveTarget) < 10 ?
                Math.abs(this[moveKey] - moveTarget) :
                10 // 計算剩餘距離並採 10 像素平滑漸近
            const increment = this[moveKey] > moveTarget ? -distance : distance
            if (
              increment > 0 ?
                this[moveKey] < moveTarget :
                this[moveKey] > moveTarget
            ) {
              this[moveKey] += increment // 更新位置
              this.setStyles()           // 渲染樣式
              if (moveKey === 'h') this.resizeShadow() // 若爲手臂伸縮，重設陰影
              if (this.moveWith.length) {
                this.moveWith.forEach(obj => {
                  if (!obj) return
                  obj[moveKey === 'h' ? 'y' : moveKey] += increment // 同步連動移動關聯物件
                  obj.setStyles()
                })
              }
            } else {
              this.handleNext(next) // 抵達目的地，執行下一步
            }
          }, moveTime || 100)
        }
      }
      // 計算與指定目標物件之間的幾何直線距離的函式
      distanceBetween(target) {
        return Math.round(
          Math.sqrt(
            Math.pow(this.x - target.x, 2) + Math.pow(this.y - target.y, 2),
          ),
        )
      }
    }

    // 娃娃機內可被抓取玩具的 Class 類別
    class Toy extends WorldObject {
      // 玩具的建構子，隨機初始化玩具類型、大小與擺放位置座標
      constructor(props) {
        const toyType = sortedToys[props.index] // 依隨機化清單獲取當前類型
        const size = toys[toyType]             // 獲取規格引數
        super({
          el: Object.assign(document.createElement('div'), {
            className: `toy pix ${toyType}`, // 新增 DOM 元素並掛載類名
          }),
          // 動態計算網格位置 X
          x: cornerBuffer +
            calcX(props.index, 4) * ((machineWidth - cornerBuffer * 3) / 4) +
            size.w / 2 +
            randomN(-6, 6),
          // 動態計算網格位置 Y
          y: machineBottomTop -
            machineTop +
            cornerBuffer +
            calcY(props.index, 4) *
            ((machineBottomHeight - cornerBuffer * 2) / 3) -
            size.h / 2 +
            randomN(-2, 2),
          z: 0,
          toyType,
          ...size,
          ...props,
        })
        elements.box.append(this.el) // 將玩具元素加入櫥窗中
        const toy = this

        this.el.addEventListener('click', () => this.collectToy(toy)) // 綁定點擊收集事件
        elements.toys.push(this) // 加入玩具實例陣列
      }
      // 將已被抓取成功的玩具置中展示，並移入上方收集箱中
      collectToy(toy) {
        toy.el.classList.remove('selected')
        toy.x = machineWidth / 2 - toy.w / 2 // 移動置中
        toy.y = machineHeight / 2 - toy.h / 2
        toy.z = 7 // 設定置頂渲染層級
        toy.el.style.setProperty('--rotate-angle', '0deg') // 重設傾角
        toy.setTransformOrigin('center')
        toy.el.classList.add('display') // 套用放大彈出展示動畫特效
        elements.clawMachine.classList.add('show-overlay') // 開啟透明遮罩
        settings.collectedNumber++ // 收集次數加一
        elements.collectionBox.appendChild(
          Object.assign(document.createElement('div'), {
            className: `toy-wrapper ${settings.collectedNumber > 6 ? 'squeeze-in' : ''
              }`,
            innerHTML: `<div class="toy pix ${toy.toyType}"></div>`, // 插入至上方收集箱展示
          }),
        )
        setTimeout(() => {
          elements.clawMachine.classList.remove('show-overlay')
          if (!document.querySelector('.selected'))
            elements.collectionArrow.classList.remove('active') // 清除收集引導箭頭
        }, 1000)
      }
      // 計算並設定當玩具被夾爪吸住後，受物理慣性而產生的傾斜角度的函式
      setRotateAngle() {
        const angle =
          radToDeg(
            Math.atan2(
              this.y + this.h / 2 - this.clawPos.y,
              this.x + this.w / 2 - this.clawPos.x,
            ),
          ) - 90
        const adjustedAngle = Math.round(adjustAngle(angle))
        this.angle =
          adjustedAngle < 180 ? adjustedAngle * -1 : 360 - adjustedAngle
        this.el.style.setProperty('--rotate-angle', `${this.angle}deg`) // 寫入 CSS 傾斜變數
      }
    }

    // 遊戲初始設定
    elements.box.style.setProperty('--shadow-pos', `${maxArmLength}px`) // 設定娃娃機陰影定位深度

    // 實例化機械臂的各項核心定位組件
    const armJoint = new WorldObject({
      className: 'arm-joint', // 綁定關節 DOM
    })

    const vertRail = new WorldObject({
      className: 'vert', // 綁定垂直滑軌 DOM
      moveWith: [null, armJoint], // 垂直軌道移動時，關節同動
    })

    const arm = new WorldObject({
      className: 'arm', // 綁定伸縮吊臂 DOM
    })

    armJoint.resizeShadow() // 初始化陰影

    // 執行開局爪子從左上角原點自動歸位滑動的啟動動畫
    armJoint.move({
      moveKey: 'y',
      target: machineTopHeight - machineBuffer.y, // 爪子移至滑軌頂端
      moveTime: 50,
      next: () =>
        vertRail.resumeMove({
          moveKey: 'x',
          target: machineBuffer.x, // 爪子移至最左側
          moveTime: 50,
          next: () => {
            Object.assign(armJoint.default, {
              y: machineTopHeight - machineBuffer.y,
              x: machineBuffer.x,
            })
            Object.assign(vertRail.default, {
              x: machineBuffer.x,
            })
            activateHoriBtn() // 完成歸位，激活第一個箭頭按鈕
          },
        }),
    })

    // 碰撞偵測輔助函式，判斷兩物件是否重疊
    const doOverlap = (a, b) => {
      return b.x > a.x && b.x < a.x + a.w && b.y > a.y && b.y < a.y + a.h
    }

    // 下爪後偵測與夾爪重疊度最高的玩具，若重疊則將其綁定為抓取目標
    const getClosestToy = () => {
      const claw = {
        y: armJoint.y + maxArmLength + machineBuffer.y + 7,
        x: armJoint.x + 7,
        w: 40,
        h: 32,
      }
      const overlappedToys = elements.toys.filter(t => {
        return doOverlap(t, claw) // 篩選重疊玩具
      })

      if (overlappedToys.length) {
        const toy = overlappedToys.sort((a, b) => b.index - a.index)[0] // 優先挑選最上面的玩具
        toy.setTransformOrigin({
          x: claw.x - toy.x,
          y: claw.y - toy.y,
        })
        toy.setClawPos({
          x: claw.x,
          y: claw.y,
        })
        settings.targetToy = toy // 綁定為當前抓取目標
      }
    }

    // 迴圈建立 11 個隨機分布的初始玩具
    new Array(12).fill('').forEach((_, i) => {
      if (i === 8) return // 略過特定索引使娃娃排列有孔隙感
      new Toy({
        index: i
      })
    })

    // 水平按鈕釋放後，鎖定水平按鈕並解鎖垂直下爪按鈕的控制函式
    const stopHoriBtnAndActivateVertBtn = () => {
      armJoint.interval = null
      horiBtn.deactivate()
      vertBtn.activate()
    }

    // 回歸預設狀態，重新解鎖水平控制按鈕以進行下一次挑戰的控制函式
    const activateHoriBtn = () => {
      horiBtn.activate()
      ;
      [vertRail, armJoint, arm].forEach(c => (c.interval = null)) // 清理全部計時排程
    }

    // 機械爪回到左上角落物口後釋放爪子，將夾到的玩具丟下並重設按鈕狀態的函式
    const dropToy = () => {
      arm.el.classList.add('open') // 機械爪張開
      if (settings.targetToy) {
        settings.targetToy.z = 3 // 降低渲染層級使其順利掉入落物箱
        settings.targetToy.move({
          moveKey: 'y',
          target: machineHeight - settings.targetToy.h - 30, // 玩具向下墜落
          moveTime: 50,
        })
        ;
        [vertRail, armJoint, arm].forEach(obj => (obj.moveWith[0] = null)) // 取消移動同動綁定
      }
      setTimeout(() => {
        arm.el.classList.remove('open') // 閉合機械爪
        activateHoriBtn() // 開啟下一次操作
        if (settings.targetToy) {
          settings.targetToy.el.classList.add('selected') // 標記為待收集狀態
          elements.collectionArrow.classList.add('active') // 亮起收集指引箭頭
          settings.targetToy = null
        }
      }, 700)
    }

    // 偵測是否成功抓取玩具並切換機械臂同步移動狀態與套用玩具抓起樣式的控制函式
    const grabToy = () => {
      if (settings.targetToy) {
        ;
        [vertRail, armJoint, arm].forEach(
          obj => (obj.moveWith[0] = settings.targetToy), // 將玩具同動掛載至所有手臂部件
        )
        settings.targetToy.setRotateAngle() // 重算受力頃角
        settings.targetToy.el.classList.add('grabbed') // 套用被夾起之雪碧圖樣式
      } else {
        arm.el.classList.add('missed') // 沒夾到，套用空夾微顫與空爪樣式
      }
    }

    // 水平按鈕實例
    const horiBtn = new Button({
      className: 'hori-btn',
      isLocked: true,
      pressAction: () => {
        arm.el.classList.remove('missed')
        vertRail.move({
          moveKey: 'x',
          target: machineWidth - armJoint.w - machineBuffer.x, // 移動至最右側限制
          next: stopHoriBtnAndActivateVertBtn,
        })
      },
      releaseAction: () => {
        clearInterval(vertRail.interval)
        stopHoriBtnAndActivateVertBtn() // 停止移動並換手解鎖下爪按鈕
      },
    })

    // 垂直與下爪按鈕實例，負責整個伸降與回拉流程
    const vertBtn = new Button({
      className: 'vert-btn',
      isLocked: true,
      pressAction: () => {
        if (vertBtn.isLocked) return
        armJoint.move({
          moveKey: 'y',
          target: machineBuffer.y, // 移動至下方最大限制
        })
      },
      releaseAction: () => {
        clearInterval(armJoint.interval)
        vertBtn.deactivate() // 鎖定下爪按鈕禁止重複操作
        getClosestToy() // 運算是否有重疊娃娃
        setTimeout(() => {
          arm.el.classList.add('open') // 手臂張開下探
          arm.move({
            moveKey: 'h',
            target: maxArmLength, // 伸長吊臂向下
            next: () =>
              setTimeout(() => {
                arm.el.classList.remove('open') // 機械爪張開抓取
                grabToy() // 判定是否抓起並套用樣式
                arm.resumeMove({
                  moveKey: 'h', // 機械臂向上縮回
                  next: () => {
                    vertRail.resumeMove({
                      moveKey: 'x', // 機械臂向左滑回落物口
                      next: () => {
                        armJoint.resumeMove({
                          moveKey: 'y', // 機械臂回彈對齊落物孔
                          next: dropToy, // 放開爪子丟落玩具
                        })
                      },
                    })
                  },
                })
              }, 500),
          })
        }, 500)
      },
    })
  </script>
</body>

</html>
