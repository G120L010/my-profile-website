<!DOCTYPE html>
<!-- 設定網頁使用的語系為繁體中文 (zh-Hant)，能幫助瀏覽器與搜尋引擎識別網頁語言 -->
<html lang="zh-Hant">

<head>
  <!-- 設定網頁編碼格式為 UTF-8，以防止中文字元在瀏覽器中出現亂碼 -->
  <meta charset="UTF-8">
  <!-- 設定網頁在瀏覽器分頁標籤上顯示的圖示 (Favicon) 路徑 -->
  <link rel="icon" href="favicon.ico">
  <!-- 設定響應式網頁的視埠規格，讓網頁在手機、平版與電腦螢幕上能自動依螢幕寬度自適應縮放， initial-scale=1.0 代表不放大縮小預設呈現 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA 漸進式網頁應用 manifest 與行動端 App 標籤 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HanJohn履歷">
  <!-- 設定網頁的總標題，這會顯示在瀏覽器的分頁標籤名稱與搜尋引擎的搜尋結果中 -->
  <title>HanJohn | 翰彰個人品牌雲端履歷作品集</title>
</head>

<body>
  <!-- 這是全站網頁畫面掛載的最根本 HTML 節點盒子容器 -->
  <!-- Vue 程式碼在初始化運行時，會找到 id="app" 的標籤，並將所有動態渲染的元件畫面強行塞入此處展示 -->
  <div id="app"></div>

  <!-- 引入全站前端 JavaScript 程式碼的唯一核心總入口點檔案 -->
  <!-- type="module" 代表瀏覽器將以現代 ES6 模組化語法標準來載入並執行此 JS 檔案 -->
  <script type="module" src="src/main.js"></script>
</body>

</html>
